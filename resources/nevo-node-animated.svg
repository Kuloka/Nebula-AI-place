    <circle cx="64" cy="84" r="16" fill="#EDEBE3"/>
    <circle cx="116" cy="84" r="16" fill="#EDEBE3"/>
    <g class="pupils-drift"><circle cx="68" cy="87" r="6.5" fill="#0F1E2B"/><circle cx="120" cy="87" r="6.5" fill="#0F1E2B"/></g>
