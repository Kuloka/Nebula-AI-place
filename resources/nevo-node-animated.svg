<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 180 223">
  <style>
    @keyframes squash-stretch{0%,100%{transform:scale(1) rotate(0)}25%{transform:scale(.97,1.04) rotate(-1.5deg)}50%{transform:scale(1.03,.96) rotate(0)}75%{transform:scale(.98,1.03) rotate(1.5deg)}}
    @keyframes eyes-drift{0%,100%{transform:translate(0)}20%{transform:translate(-2px,-1px)}40%{transform:translate(1px,2px)}60%{transform:translate(2px,-1px)}80%{transform:translate(-1px,1px)}}
    .ghost-alive{animation:squash-stretch 3.5s ease-in-out infinite;transform-origin:90px 178px}.pupils-drift{animation:eyes-drift 4.5s ease-in-out infinite}
  </style>
  <defs>
